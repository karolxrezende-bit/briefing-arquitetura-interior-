<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing | Arq Karolyne Ximenes</title>

<style>

/* ===== BASE ===== */
body {
  margin: 0;
  background: #0b0b0c;
  color: #fff;
  font-family: Arial, sans-serif;
}

.wrap {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* ===== HERO ===== */
.hero {
  background: linear-gradient(135deg,#111,#1b1b1b);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

.hero h1 {
  margin: 10px 0;
}

/* ===== BOTÕES ===== */
.inline-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

button {
  background: #2a2a2a;
  border: none;
  color: #fff;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
}

/* ===== SEÇÕES ===== */
.section {
  background: #141414;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 12px;
}

.fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.field-full {
  grid-column: 1 / -1;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: #fff;
}

/* ================= PRINT ================= */
@media print {

  @page {
    size: A4;
    margin: 12mm;
  }

  body {
    background: #fff !important;
    color: #111 !important;
  }

  .inline-actions {
    display: none !important;
  }

  .hero {
    background: #fff !important;
    border: 1px solid #ddd;
  }

  .section {
    background: #fff !important;
    border: 1px solid #ddd;
    page-break-inside: avoid;
  }

  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  input, textarea, select {
    background: #fff !important;
    color: #111 !important;
    border: 1px solid #ccc !important;
  }

}

</style>
</head>

<body>

<div class="wrap">

<div class="hero">
<h1>Arq Karolyne Ximenes</h1>
<p>Briefing completo para reforma de apartamento</p>
</div>

<div class="inline-actions">
<button onclick="window.print()">Salvar em PDF</button>
</div>

<div class="section">
<h2>Informações gerais</h2>

<div class="fields">
<input placeholder="Nome do cliente">
<input placeholder="Telefone">
<input placeholder="Email">
<input placeholder="Endereço">
<div class="field-full">
<textarea placeholder="Observações"></textarea>
</div>
</div>

</div>

</div>

</body>
</html>
